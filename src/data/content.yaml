  summary: 'Senior DevOps Engineer with 3+ years of experience building cloud-native platforms and CI/CD infrastructure for engineering simulation products. Proven track record of rapid prototyping, cross-team enablement, and turning ambiguous technical challenges into production-ready solutions across Azure, AWS, and Kubernetes environments. Published researcher with an MSc in Advanced Computer Science from the University of Leicester.'
  email: 'sharathct22@gmail.com'
  linkedin: 'https://www.linkedin.com/in/sharathct22'
  github: 'https://github.com/thesct22'
  website: 'https://sharath.is-a.dev'

